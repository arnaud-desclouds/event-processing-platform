name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements-dev.txt
          ./.venv/bin/python -m pip install \
            -r services/ingestion_api/requirements.txt \
            -r services/processor_worker/requirements.txt

      - name: Create local env file
        run: cp .env.example .env

      - name: Lint
        run: ./.venv/bin/python -m ruff check services tests alembic

      - name: Type check
        run: |
          ./.venv/bin/python -m mypy services/common services/processor_worker services/ingestion_api
          ./.venv/bin/python -m pyright services/common services/processor_worker services/ingestion_api

      - name: Test
        run: ./.venv/bin/python -m pytest -q
