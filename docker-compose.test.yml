name: event-processing-platform-test

services:
  # --- Broker ---------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      # Dual listeners:
      # - INTERNAL: docker network clients
      # - EXTERNAL: host-based integration tests
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:29092
      # Keep pandaproxy enabled internally, but do NOT publish it to host in tests.
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
    ports:
      # Map EXTERNAL kafka listener to a non-colliding host port.
      - "29092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # --- Datastores -----------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-events}
      POSTGRES_USER: ${POSTGRES_USER:-events_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-events_password}
    ports:
      - "15432:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-events_user} -d ${POSTGRES_DB:-events}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # --- Application Services -------------------------------------------------
  ingestion-api:
    build:
      context: ./services/ingestion-api
    env_file: .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18000:8000"

  processor-worker:
    build:
      context: ./services/processor-worker
    env_file: .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PYTHONUNBUFFERED: "1"
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8081
    ports:
      - "18081:8081"
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # One-shot migrations job (test DB)
  migrate:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-events}
      POSTGRES_USER: ${POSTGRES_USER:-events_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-events_password}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "pip install -q alembic SQLAlchemy psycopg2-binary
      && alembic upgrade head || alembic stamp head"

  # --- Observability (optional for tests) -----------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "14317:4317"
      - "14318:4318"

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "26686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_ZIPKIN_HOST_PORT: "0.0.0.0:9411"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data-test:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata_test:
  grafana-data-test:
